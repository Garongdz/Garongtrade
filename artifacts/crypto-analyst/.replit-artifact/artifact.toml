kind = "web"
previewPath = "/"
title = "Crypto Analyst"
version = "1.0.0"
id = "artifacts/crypto-analyst"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23374
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/crypto-analyst run dev"

[services.env]
PORT = "23374"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/crypto-analyst", "run", "build"]
publicDir = "artifacts/crypto-analyst/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
